<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrasi Player MLBB 4S ( Sulut Elite Gank )</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:100%;
max-width:750px;
background:rgba(15,23,42,.85);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:30px;
box-shadow:0 0 40px rgba(0,229,255,.15);
}

.hero{
text-align:center;
margin-bottom:25px;
}

.title{
font-size:35px;
font-weight:800;
background:linear-gradient(90deg,#FFD700,#FF8C00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
margin-top:10px;
font-size:24px;
font-weight:700;
color:#00E5FF;
}

.desc{
margin-top:10px;
opacity:.85;
font-size:14px;
}

.banner{
margin-top:20px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
padding:15px;
border-radius:15px;
font-weight:600;
text-align:center;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:20px 0;
}

.card{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:15px;
text-align:center;
}

.card h3{
font-size:24px;
color:#00ffcc;
}

.card p{
font-size:13px;
margin-top:5px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
font-size:14px;
}

input::placeholder,
textarea::placeholder{
color:#bbb;
}

textarea{
resize:none;
height:100px;
}

.btn-wa{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#25D366,#128C7E);
font-size:17px;
font-weight:700;
color:white;
cursor:pointer;
margin-top:10px;
transition:.3s;
box-shadow:0 0 20px rgba(37,211,102,.4);
}

.btn-wa:hover{
transform:translateY(-3px);
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
opacity:.7;
}

@media(max-width:700px){

.stats{
grid-template-columns:1fr;
}

.title{
font-size:28px;
}

.subtitle{
font-size:20px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="hero">

<h1 class="title">
🎮 REGISTRASI PLAYER MLBB
</h1>

<h2 class="subtitle">
4S ( SULUT ELITE GANK )
</h2>

<p class="desc">
Bergabung bersama squad kompetitif Sulawesi Utara.
Push Rank • Scrim • Turnamen • Teamwork
</p>

<div class="banner">
🔥 OPEN RECRUITMENT PLAYER MLBB 🔥
</div>

</div>

<div class="stats">

<div class="card">
<h3>11</h3>
<p>Player Aktif</p>
</div>

<div class="card">
<h3>14</h3>
<p>Turnamen</p>
</div>

<div class="card">
<h3>1</h3>
<p>Squad Aktif</p>
</div>

</div>

<form>

<div class="form-group">
<label>Nickname MLBB</label>
<input type="text" id="nickname" placeholder="Masukkan Nickname">
</div>

<div class="form-group">
<label>ID MLBB</label>
<input type="text" id="idml" placeholder="Contoh 123456789">
</div>

<div class="form-group">
<label>Server</label>
<input type="text" id="server" placeholder="Contoh 1234">
</div>

<div class="form-group">
<label>Role Utama</label>
<select id="role">
<option>Tank</option>
<option>Roamer</option>
<option>Jungler</option>
<option>Mid Lane</option>
<option>Gold Lane</option>
<option>EXP Lane</option>
</select>
</div>

<div class="form-group">
<label>Rank Saat Ini</label>
<select id="rank">
<option>Epic</option>
<option>Legend</option>
<option>Mythic</option>
<option>Mythic Honor</option>
<option>Mythic Glory</option>
<option>Mythical Immortal</option>
</select>
</div>

<div class="form-group">
<label>Nomor WhatsApp</label>
<input type="text" id="nomor" placeholder="08xxxxxxxxxx">
</div>

<div class="form-group">
<label>Alasan Bergabung</label>
<textarea id="alasan" placeholder="Tulis alasan ingin bergabung"></textarea>
</div>

<button type="button" class="btn-wa" onclick="kirimWA()">
📱 DAFTAR SEKARANG VIA WHATSAPP
</button>

</form>

<div class="footer">
© 2026 Registrasi Player MLBB 4S ( Sulut Elite Gank )
</div>

</div>

<script>

function kirimWA(){

let nickname=document.getElementById("nickname").value;
let idml=document.getElementById("idml").value;
let server=document.getElementById("server").value;
let role=document.getElementById("role").value;
let rank=document.getElementById("rank").value;
let nomor=document.getElementById("nomor").value;
let alasan=document.getElementById("alasan").value;

/* GANTI DENGAN NOMOR ADMIN */
let admin="6285298529828";

let pesan=
`🏆 REGISTRASI PLAYER MLBB 4S (SULUT ELITE GANK)

🎮 Nickname : ${nickname}
🆔 ID MLBB : ${idml}
🌐 Server : ${server}
⚔️ Role : ${role}
🏅 Rank : ${rank}
📱 WhatsApp : ${nomor}

📝 Alasan Bergabung :
${alasan}`;

window.open(
`https://wa.me/${admin}?text=${encodeURIComponent(pesan)}`,
'_blank'
);

}

</script>

</body>
  </html>
